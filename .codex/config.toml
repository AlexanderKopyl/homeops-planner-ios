# Codex configuration for HomeOps Planner.
# Keep this file minimal until the project needs stricter automation.

project_doc_fallback_filenames = ["AGENTS.md"]

[project]
name = "homeops-planner-ios"
description = "HomeOps Planner — iOS-only local-first SwiftUI app for recurring household supplies and maintenance tasks."

[workflow]
read_first = [
  "AGENTS.md",
  ".codex/docs/project-overview.md",
  ".codex/docs/mvp-boundary.md",
  ".codex/docs/architecture-notes.md",
  ".codex/docs/mcp-usage.md"
]

[guardrails]
version_1_only = true
backend_allowed = false
auth_allowed = false
cloud_sync_allowed = false
firebase_allowed = false
external_packages_require_approval = true
ci_cd_allowed = false
subagents_allowed = true

# Subagents are allowed, but they should be used explicitly and sparingly.
# Keep max_depth low to avoid recursive delegation and unnecessary token usage.
[agents]
max_threads = 3
max_depth = 1
job_max_runtime_seconds = 1200

# MCP servers used by Codex for this project.
# If the Codex CLI does not read project-local config on your machine,
# copy these sections into ~/.codex/config.toml or add them via `codex mcp add`.

[mcp_servers.sequentialthinking]
command = "docker"
args = ["run", "--rm", "-i", "mcp/sequentialthinking"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
